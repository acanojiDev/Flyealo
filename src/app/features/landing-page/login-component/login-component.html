<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
  <div class="auth-form__field">
    <label for="email-login" class="auth-form__label">Email</label>
    <div class="auth-form__input-wrapper" [class.auth-form__input-wrapper--focused]="email?.dirty">
      <svg class="auth-form__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="20" height="16" x="2" y="4" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <input
        id="email-login"
        type="email"
        formControlName="email"
        placeholder="you@email.com"
        class="auth-form__input"
        [class.auth-form__input--error]="email?.invalid && email?.dirty"
      />
    </div>
    @if (email?.invalid && email?.dirty) {
      <span class="auth-form__error">
        @if (email?.hasError('required')) {
          Email is required
        } @else if (email?.hasError('email')) {
          Invalid email
        }
      </span>
    }
  </div>

  <div class="auth-form__field">
    <label for="password-login" class="auth-form__label">Password</label>
    <div class="auth-form__input-wrapper" [class.auth-form__input-wrapper--focused]="password?.dirty">
      <svg class="auth-form__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input
        id="password-login"
        [type]="showPassword() ? 'text' : 'password'"
        formControlName="password"
        placeholder="•••••••"
        class="auth-form__input auth-form__input--with-toggle"
        [class.auth-form__input--error]="password?.invalid && password?.dirty"
      />
      <button
        type="button"
        class="auth-form__toggle-password"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      >
        @if (showPassword()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="2" x2="22" y1="2" y2="22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        }
      </button>
    </div>
    @if (password?.invalid && password?.dirty) {
      <span class="auth-form__error">
        @if (password?.hasError('required')) {
          Password is required
        }
      </span>
    }
  </div>

  <button
    type="submit"
    class="auth-form__submit"
    [disabled]="loginForm.invalid"
  >
    Sign in
  </button>

  <div class="auth-form__divider">
    <span>or</span>
  </div>

  <button type="button" class="auth-form__google" (click)="onGoogleSignIn()">
    <svg class="auth-form__google-icon" viewBox="0 0 24 24" width="20" height="20">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
</form>
