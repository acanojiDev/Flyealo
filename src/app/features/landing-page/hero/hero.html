<section class="hero">
  <!-- Animated Background -->
  <div class="hero__bg">
    <div class="hero__blob hero__blob--1"></div>
    <div class="hero__blob hero__blob--2"></div>
    <div class="hero__blob hero__blob--3"></div>
  </div>

  <div class="hero__container">
    <div class="hero__badge">Powered by AI &middot; Loved by travelers</div>

    <h1 class="hero__title">
      Travel planning<br />that
      <span class="hero__title--italic">actually works</span>
    </h1>

    <p class="hero__description">
      Generate personalized itineraries in seconds. No more endless <br /> research. Just tell us where you
      want to go.
    </p>

    <div class="hero__actions">
      <button class="hero__primary" type="button" (click)="openRegister()">
        Start free week
      </button>
      <a class="hero__secondary" href="#how">
        See how it works
      </a>
    </div>

    <div class="hero__features">
      <span class="hero__feature"><span class="hero__feature__circle">&bull;</span> Free week trial</span>
      <span class="hero__feature"><span class="hero__feature__circle">&bull;</span> All the countries</span>
    </div>
  </div>
</section>
